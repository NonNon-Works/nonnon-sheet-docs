  namespace: NonNonSheet.Editor
  summary: >-
    フォーカスが別の Cell に移動した場合はスキップし、そうでなければ次フレームで自身にフォーカスを当てる。

    編集終了時に FocusNextFrame() の代わりに呼ぶことで、他のセルへの選択直後に数値キーを押したとき

    誤って自セルが編集状態になるバグを防ぐ。
  example: []
  syntax:
    content: public void FocusNextFrameIfNotCell(VisualElement focusMovedTo)
