    id: FindBoundaryCells
    path: ../NonNonSheet/src/NonNonSheet.Unity/Packages/com.nonnon-works.nonnon-sheet/Editor/Scripts/View/VisibleCellRegistry.cs
    startLine: 87
  namespace: NonNonSheet.Editor
  summary: >-
    指定した表示順 (<code class="paramref">displayIndices</code>) に従って

    選択行セット × 列範囲 [left, right] に含まれ、かつ <code class="paramref">viewportBound</code>

    と Y 方向で重なるセルを探し、表示順で最上段のセルを topLeft、最下段のセルを

    bottomRight として返す。


    worldBound ではなく displayIndices の順序を用いるのは、スクロール直後に

    仮想化プールが再バインドしたセルの worldBound がレイアウトパス前に

    古い位置を指していることがあり、worldBound による順序付けが不正確になるため。
  example: []
  syntax:
    content: public (Cell topLeft, Cell bottomRight) FindBoundaryCells(HashSet<int> selectedRows, int left, int right, Rect viewportBound, IReadOnlyList<int> displayIndices)
    parameters:
    - id: selectedRows
      type: System.Collections.Generic.HashSet{System.Int32}
    - id: left
      type: System.Int32
    - id: right
      type: System.Int32
    - id: viewportBound
      type: Rect
    - id: displayIndices
      type: System.Collections.Generic.IReadOnlyList{System.Int32}
    return:
      type: System.ValueTuple{NonNonSheet.Editor.Cell,NonNonSheet.Editor.Cell}
    content.vb: Public Function FindBoundaryCells(selectedRows As HashSet(Of Integer), left As Integer, right As Integer, viewportBound As Rect, displayIndices As IReadOnlyList(Of Integer)) As (topLeft As Cell, bottomRight As Cell)
