  namespace: NonNonSheet.Editor
  summary: >-
    データ行インデックスの範囲 [top, bottom] × 列範囲 [left, right] に含まれるセルを探し、

    データ行インデックスが最小のセルを topLeft、最大のセルを bottomRight として返す。

    RowReorderSystem など、ソートを考慮しない用途に使用する。
  example: []
  syntax:
    content: public (Cell topLeft, Cell bottomRight) FindBoundaryCells(int top, int bottom, int left, int right)
    parameters:
    - id: top
      type: System.Int32
    - id: bottom
      type: System.Int32
    - id: left
      type: System.Int32
    - id: right
      type: System.Int32
    return:
      type: System.ValueTuple{NonNonSheet.Editor.Cell,NonNonSheet.Editor.Cell}
