  namespace: NonNonSheet.Editor
  summary: >-
    指定したデータ行インデックスセット × 列範囲 [left, right] に含まれるセルを探し、

    視覚的に最上部のセルを topLeft、最下部のセルを bottomRight として返す。

    ソート時にも正しくマーカー範囲を算出するために worldBound の Y 座標を用いる。
  example: []
  syntax:
    content: public (Cell topLeft, Cell bottomRight) FindBoundaryCells(HashSet<int> selectedRows, int left, int right)
    parameters:
    - id: selectedRows
      type: System.Collections.Generic.HashSet{System.Int32}
    - id: left
      type: System.Int32
    - id: right
      type: System.Int32
    return:
      type: System.ValueTuple{NonNonSheet.Editor.Cell,NonNonSheet.Editor.Cell}
